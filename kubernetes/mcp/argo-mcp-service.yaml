apiVersion: v1
kind: Service
metadata:
  name: argo-mcp-server
  namespace: ${namespace}
  labels:
    app.kubernetes.io/name: argo-mcp-server
    app.kubernetes.io/part-of: mcp
spec:
  type: ${service_type}
  selector:
    app.kubernetes.io/name: argo-mcp-server
  ports:
    - name: http
      port: ${argo_mcp_port}
      targetPort: http
