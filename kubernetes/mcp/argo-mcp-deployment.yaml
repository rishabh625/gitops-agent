apiVersion: apps/v1
kind: Deployment
metadata:
  name: argo-mcp-server
  namespace: ${namespace}
  labels:
    app.kubernetes.io/name: argo-mcp-server
    app.kubernetes.io/part-of: mcp
spec:
  replicas: ${argo_mcp_replicas}
  selector:
    matchLabels:
      app.kubernetes.io/name: argo-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argo-mcp-server
        app.kubernetes.io/part-of: mcp
    spec:
      serviceAccountName: ${service_account_name}
      containers:
        - name: argo-mcp
          image: ${argo_mcp_image}
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: argo-mcp-config
            - secretRef:
                name: argo-mcp-secret
          ports:
            - name: http
              containerPort: ${argo_mcp_port}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
