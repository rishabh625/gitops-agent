apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-mcp-server
  namespace: ${namespace}
  labels:
    app.kubernetes.io/name: k8s-mcp-server
    app.kubernetes.io/part-of: mcp
spec:
  replicas: ${k8s_mcp_replicas}
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-mcp-server
        app.kubernetes.io/part-of: mcp
    spec:
      serviceAccountName: ${service_account_name}
      containers:
        - name: k8s-mcp
          image: ${k8s_mcp_image}
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: k8s-mcp-config
          ports:
            - name: http
              containerPort: ${k8s_mcp_port}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
